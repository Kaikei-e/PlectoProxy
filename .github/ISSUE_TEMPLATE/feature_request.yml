name: Feature request
description: Suggest an idea or enhancement for Plecto
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Plecto is built ADR-first and design decisions follow the project's
        [tenets](https://github.com/Kaikei-e/Plecto#design-tenets). For a larger change, consider
        opening a [Discussion](https://github.com/Kaikei-e/Plecto/discussions) first so we can agree
        on the shape.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and where does Plecto fall short today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Where does it belong — the native fast path, a WASM filter, or the host-API?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related ADRs, prior art, or use cases.
