# Plecto CI — local CI parity (tdd-workflow Phase 5): fmt / clippy / test / build,
# plus a wasm-guest lint and a blocking supply-chain scan.
#
# Layout note: the cargo workspace lives in `plecto/`. The example filter
# `plecto/examples/filters/filter-hello` is a SEPARATE workspace (its own `target/`) built
# for `wasm32-unknown-unknown`; `plecto/crates/host/build.rs` compiles it and
# componentizes it via `wit-component` (ADR 000010). So every compiling job must
# install the `wasm32-unknown-unknown` target BEFORE any host build/test, or the
# host build script fails.
#
# Hardening follow-up (Plecto supply-chain stance, ADR 000006 / OWASP A08):
# pin these third-party actions to full commit SHAs once we vendor a review.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: nothing here writes to the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (saves CI on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: plecto

jobs:
  # Fast feedback: formatting only — no compilation, no cache, no wasm target.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          # SHA-pinned (A08): the action selects the toolchain from its ref name, so pin it back here.
          toolchain: "1.96.0"
          components: rustfmt
      - run: cargo fmt --all -- --check
      # filter-hello is a separate workspace, formatted on its own.
      - run: cargo fmt --all -- --check
        working-directory: plecto/examples/filters/filter-hello

  # Main gate: clippy -> test -> build, sharing one compile cache.
  # `cargo test`/`build` transitively compile + componentize the guest via build.rs.
  build:
    name: clippy + test + build
    runs-on: ubuntu-latest
    env:
      # No debug-info in the debug builds (the test profile inherits dev): every integration
      # test binary statically links wasmtime/cranelift + aws-lc + quinn, and with debuginfo
      # the combined target/ can overflow the runner disk mid-link (ENOSPC / linker bus
      # error). Panic backtraces keep symbol names; only source line info is lost.
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # wasmtime 46 / cranelift (ADR 000021) is a large build, and this job holds BOTH the
      # debug target/ (cargo test --all) and the release target/ (cargo build --release) at
      # once. Free the runner's preinstalled bloat (~25GB: Android SDK / .NET / GHC / hosted
      # tool cache / Boost) so both fit — inline rm, no third-party action (supply-chain
      # stance). Best-effort (|| true). Guarded to GitHub-hosted runners: their VM is ephemeral
      # and passwordless-sudo by design, whereas on a self-hosted runner this rm would gut a
      # persistent machine.
      - name: Free disk space for the wasmtime/cranelift build
        if: runner.environment == 'github-hosted'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /usr/local/share/boost || true
          df -h /
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0" # SHA-pinned (A08): re-state the toolchain the ref no longer encodes.
          components: clippy
          # wasm32-unknown-unknown: build.rs builds the header-only guests. wasm32-wasip2: the
          # `--all-features` clippy + the streaming-body test build the async stream<u8> guest.
          targets: wasm32-unknown-unknown, wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto
          cache-on-failure: true
          # Cache the workspace target/ and the excluded guests' own target/.
          workspaces: |
            plecto
            plecto/examples/filters/filter-hello
            plecto/examples/filters/filter-streaming
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      # Experimental streaming body filter (OFF by default): exercise it so it cannot bit-rot.
      - run: cargo test -p plecto-host --features streaming-body
      - run: cargo build --release

  # Lint the excluded WASM guest against its real target.
  guest-lint:
    name: filter-hello (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plecto/examples/filters/filter-hello
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0" # SHA-pinned (A08): re-state the toolchain the ref no longer encodes.
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-guest
          workspaces: plecto/examples/filters/filter-hello
      - run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings

  # Polyglot guests: build the non-Rust example filters (MoonBit / JS / C — all zero-WASI
  # components, each by its own toolchain) and run the SAME conformance assertions against
  # them (crates/host/tests/polyglot.rs). This is the falsifiable form of the polyglot claim;
  # without this job the examples would bit-rot silently. Tool tarballs are sha256-pinned
  # (supply-chain stance, A08); MoonBit only distributes `latest`, so it installs unpinned —
  # pin it too once versioned artifacts are published.
  polyglot-guests:
    name: polyglot guests (MoonBit / JS / C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0" # SHA-pinned (A08): re-state the toolchain the ref no longer encodes.
          # build.rs still componentizes the Rust test fixtures during `cargo test`.
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-polyglot
          cache-on-failure: true
          workspaces: plecto
      - name: Install wasm-tools / wit-bindgen / wasi-sdk (sha256-pinned)
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          curl -sSL -o wasm-tools.tar.gz https://github.com/bytecodealliance/wasm-tools/releases/download/v1.252.0/wasm-tools-1.252.0-x86_64-linux.tar.gz
          echo "097b1181d5b2bc3f2ebc44b4e72edf18308902023f1f1483a1a7dc1268ea988d  wasm-tools.tar.gz" | sha256sum -c -
          curl -sSL -o wit-bindgen.tar.gz https://github.com/bytecodealliance/wit-bindgen/releases/download/v0.58.0/wit-bindgen-0.58.0-x86_64-linux.tar.gz
          echo "16831a7b18fed12f1b1ece26e458adb0c6c9ce0c7f3308e3f2fb7770f990a618  wit-bindgen.tar.gz" | sha256sum -c -
          curl -sSL -o wasi-sdk.tar.gz https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-33/wasi-sdk-33.0-x86_64-linux.tar.gz
          echo "0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce  wasi-sdk.tar.gz" | sha256sum -c -
          tar xzf wasm-tools.tar.gz && tar xzf wit-bindgen.tar.gz && tar xzf wasi-sdk.tar.gz
          echo "${{ runner.temp }}/wasm-tools-1.252.0-x86_64-linux" >> "$GITHUB_PATH"
          echo "${{ runner.temp }}/wit-bindgen-0.58.0-x86_64-linux" >> "$GITHUB_PATH"
          echo "WASI_SDK_PATH=${{ runner.temp }}/wasi-sdk-33.0-x86_64-linux" >> "$GITHUB_ENV"
      - name: Install MoonBit
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Build the three guests (each asserts zero WASI imports)
        run: |
          ./examples/filters/filter-hello-c/build.sh
          ./examples/filters/filter-hello-moonbit/build.sh
          ./examples/filters/filter-hello-js/build.sh
      - name: Same contract, same assertions, three languages
        run: cargo test -p plecto-host --features polyglot-conformance --test polyglot

  # Supply-chain scan (RustSec advisories + crate bans), BLOCKING (ADR 000006 / OWASP A08).
  # A security vulnerability, unmaintained crate, or yanked version fails CI — supply-chain
  # integrity is a security gate, not a courtesy check. Policy is the curated `plecto/deny.toml`
  # (advisories deny; transitive duplicate versions warn). Clear an advisory by fixing/replacing
  # the crate, not by silencing it.
  cargo-deny:
    name: cargo-deny (supply-chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          manifest-path: plecto/Cargo.toml
          # `sources` also gates crate origin (only crates.io), catching a typosquat / unexpected
          # registry or git source early (A03). `licenses` stays out until an allow-list lands.
          command: check advisories bans sources
