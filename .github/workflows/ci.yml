# Plecto CI — local CI parity (tdd-workflow Phase 5): fmt / clippy / test / build,
# plus a wasm-guest lint and a blocking supply-chain scan.
#
# Layout note: the cargo workspace lives in `plecto/`. The example filter guests under
# `plecto/examples/filters/` are SEPARATE workspaces (each its own `target/`) built for
# wasm32 targets; `plecto/crates/host/build.rs` compiles and componentizes them (ADR
# 000010). So every job that compiles the workspace must install the wasm targets BEFORE
# any host build/test, or the host build script fails.
#
# Job layout (wall-time): one serial mega-job used to chain clippy → tests → release →
# polyglot on a single warm target/ and took ~45 min cold. This repo is public, so
# standard runners are free — the gate is now SPLIT into parallel jobs (clippy / test /
# test-features / shelf), each with its own cache world; cold wall time is the slowest
# job, not the sum. Heavy release-profile builds stay main-only (wasmtime-CI-style
# "PRs light, merge-time heavy"; release.yml's gate requires main green, so nothing
# ships un-parity-checked).
#
# Feature worlds (Cargo fingerprints artifacts by the enabled feature set — every extra
# combination of `--features` per invocation is a full dep rebuild, Cargo Book "Features"):
# CI compiles exactly THREE dep worlds and nothing else —
#   1. default            (test job: `cargo test --all`, the minimal-profile guarantee)
#   2. capability superset (test-features job: ONE invocation with every additive feature
#      on, polyglot conformance included — polyglot-conformance is an empty marker
#      feature, so folding it here costs nothing; giving it its own invocation used to
#      rebuild wasmtime/cranelift/tokio from scratch, ~15 min)
#   3. all-features check (clippy job: rmeta only, no codegen)
#
# Cache policy (Swatinem/rust-cache + GitHub 10GB repo limit):
# - Save only on `main` (`save-if`). PR caches are scoped to `refs/pull/N/merge` and
#   cannot be read by sibling PRs — writing them is pure budget burn and thrash.
# - One shared-key PER JOB (worlds differ); rust-cache restores on exact key match only
#   (key hashes Cargo.lock/.toml + toolchain), so a lockfile-touching push runs cold on
#   main once, then saves the new generation. Keeping each job's cache lean (deps only —
#   rust-cache prunes workspace crates) is what lets a full generation fit under the
#   10 GB cap without evicting itself.
# - Disk: freeing the runner's preinstalled bloat runs in the BACKGROUND and is waited on
#   just before the first cargo command — the old foreground rm burned 1.5 min of wall.
#   /opt/hostedtoolcache is deliberately NOT removed (setup-go installs into it).
#
# Hardening (Plecto supply-chain stance, ADR 000006 / OWASP A08): every third-party action is
# pinned to a full commit SHA, checkouts run with `persist-credentials: false` (nothing here
# pushes, so no job needs the GITHUB_TOKEN left behind in .git/config), and the workflow-lint
# job below gates all of .github/workflows/ with zizmor — the same blocking posture cargo-deny
# applies to the crate graph.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: nothing here writes to the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (saves CI on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # CI is cold-start oriented; incremental artifacts bloat the cache without helping
  # cross-run hits (Swatinem/rust-cache + corrode CI guidance).
  CARGO_INCREMENTAL: "0"
  # No debug-info in the debug builds (the test profile inherits dev): every integration
  # test binary statically links wasmtime/cranelift + aws-lc + quinn; debuginfo multiplies
  # target/ size (disk + cache transfer) and link time. Panic backtraces keep symbol
  # names; only source line info is lost.
  CARGO_PROFILE_DEV_DEBUG: "0"

defaults:
  run:
    working-directory: plecto

jobs:
  # Fast feedback: formatting only — no compilation, no cache, no wasm target.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1
        with:
          # SHA-pinned (A08) to the 1.97.1-branch tip, which hardcodes its own toolchain version —
          # this action.yml revision doesn't declare a `toolchain` input at all, so don't pass one.
          components: rustfmt
      - run: cargo fmt --all -- --check
      # Every example filter guest is a SEPARATE workspace; loop them all so a new guest
      # can never land unformatted (previously only filter-hello was checked).
      - name: rustfmt (guest workspaces)
        working-directory: plecto/examples/filters
        run: |
          set -euo pipefail
          for m in */Cargo.toml; do
            echo "== $(dirname "$m")"
            (cd "$(dirname "$m")" && cargo fmt --all -- --check)
          done
      # crates.io packaging can only include files under a crate's own root, so the WIT
      # contract and the filter-template guest are vendored into crates/host and crates/server
      # respectively. Nothing else guards those copies against drifting from their canonical
      # source — this does.
      - name: vendored publish-sources drift check
        working-directory: .
        run: python3 scripts/check_wit_vendoring.py

  docs:
    name: ADR graph check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - run: python3 scripts/check_adr_graph.py

  # Lint world: `--all-features` is check-mode only (rmeta, no codegen), so it stays its
  # own job — it shares no artifacts with the test jobs' codegen worlds anyway. all-features
  # turns on every build.rs guest build, so it needs both wasm targets and the guest caches.
  clippy:
    name: clippy (all features)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1 (branch tip; no `toolchain` input to restate)
        with:
          components: clippy
          targets: wasm32-unknown-unknown, wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-clippy
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            plecto
            plecto/examples/filters/filter-hello
            plecto/examples/filters/filter-quickstart
            plecto/examples/filters/filter-streaming
            plecto/examples/filters/filter-extauthz
            plecto/examples/filters/filter-jwt
            plecto/examples/filters/filter-cors
            plecto/examples/filters/filter-apikey
            plecto/examples/filters/filter-tcp-gate
            plecto/examples/filters/filter-ratelimit-redis
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  # Default-features world: the minimal-profile guarantee. Everything the unsuffixed
  # release artifact ships is tested exactly as it ships — no capability code compiled in.
  test:
    name: test (default features)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Debug target/ of the wasmtime/cranelift workspace is large; free the runner's
      # preinstalled bloat in the background (best-effort, waited on below) instead of
      # burning wall time on a foreground rm. Guarded to GitHub-hosted runners: their VM
      # is ephemeral and passwordless-sudo by design, whereas on a self-hosted runner
      # this rm would gut a persistent machine.
      - name: Free runner disk in the background
        if: runner.environment == 'github-hosted'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost &
          echo "$!" > /tmp/disk-rm.pid
      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1 (branch tip; no `toolchain` input to restate)
        with:
          # Default features build only the zero-WASI guests (build.rs) — no wasip2 here.
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-test
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            plecto
            plecto/examples/filters/filter-hello
            plecto/examples/filters/filter-quickstart
            plecto/examples/filters/filter-cors
            plecto/examples/filters/filter-apikey
      - name: Wait for the background disk cleanup
        if: runner.environment == 'github-hosted'
        run: |
          if [ -f /tmp/disk-rm.pid ]; then
            while [ -e "/proc/$(cat /tmp/disk-rm.pid)" ]; do sleep 2; done
          fi
          df -h /
      - run: cargo test --all --locked

  # Capability-superset world: ONE invocation with every additive feature on (ADR 000079:
  # every capability the capabilities release profile compiles in is TESTED, not just
  # clippy-checked). polyglot-conformance is an empty marker feature that only gates the
  # tests/polyglot*.rs files, so the polyglot suites (Tier A zero-WASI × MoonBit/JS/C and
  # Tier B fat-guest × TinyGo/Go) run in the SAME build instead of paying their own
  # feature world — deny-by-default is unchanged by merely compiling a capability in
  # (ADR 000063 Decision 4; the Tier A/B suites assert exactly that and stay green here).
  test-features:
    name: test (capability features + polyglot)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Free runner disk in the background
        if: runner.environment == 'github-hosted'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost &
          echo "$!" > /tmp/disk-rm.pid
      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1 (branch tip; no `toolchain` input to restate)
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-features
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            plecto
            plecto/examples/filters/filter-hello
            plecto/examples/filters/filter-quickstart
            plecto/examples/filters/filter-streaming
            plecto/examples/filters/filter-extauthz
            plecto/examples/filters/filter-jwt
            plecto/examples/filters/filter-cors
            plecto/examples/filters/filter-apikey
            plecto/examples/filters/filter-tcp-gate
            plecto/examples/filters/filter-ratelimit-redis

      # --- Polyglot guest toolchains + guests, BEFORE the test invocation ---
      - name: Install wasm-tools / wit-bindgen / wasi-sdk (sha256-pinned)
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          curl -sSL -o wasm-tools.tar.gz https://github.com/bytecodealliance/wasm-tools/releases/download/v1.252.0/wasm-tools-1.252.0-x86_64-linux.tar.gz
          echo "097b1181d5b2bc3f2ebc44b4e72edf18308902023f1f1483a1a7dc1268ea988d  wasm-tools.tar.gz" | sha256sum -c -
          curl -sSL -o wit-bindgen.tar.gz https://github.com/bytecodealliance/wit-bindgen/releases/download/v0.59.0/wit-bindgen-0.59.0-x86_64-linux.tar.gz
          echo "06b173e5aa3f3a0f5b5597c3502e2885fc9c63300f59a21151971249dda82bf4  wit-bindgen.tar.gz" | sha256sum -c -
          curl -sSL -o wasi-sdk.tar.gz https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-33/wasi-sdk-33.0-x86_64-linux.tar.gz
          echo "0ba8b5bfaeb2adf3f29bab5841d76cf5318ab8e1642ea195f88baba1abd47bce  wasi-sdk.tar.gz" | sha256sum -c -
          tar xzf wasm-tools.tar.gz && tar xzf wit-bindgen.tar.gz && tar xzf wasi-sdk.tar.gz
          echo "${{ runner.temp }}/wasm-tools-1.252.0-x86_64-linux" >> "$GITHUB_PATH"
          echo "${{ runner.temp }}/wit-bindgen-0.59.0-x86_64-linux" >> "$GITHUB_PATH"
          echo "WASI_SDK_PATH=${{ runner.temp }}/wasi-sdk-33.0-x86_64-linux" >> "$GITHUB_ENV"
      - name: Install MoonBit
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"
      - name: Install TinyGo / wkg (sha256-pinned; wasm-tools already on PATH)
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          curl -sSL -o tinygo.tar.gz https://github.com/tinygo-org/tinygo/releases/download/v0.41.1/tinygo0.41.1.linux-amd64.tar.gz
          echo "e156d1d93a376eef639a4143d13be07e8c463fb6cf2d7d447698ed4474d23e91  tinygo.tar.gz" | sha256sum -c -
          curl -sSL -o wkg https://github.com/bytecodealliance/wasm-pkg-tools/releases/download/v0.15.1/wkg-x86_64-unknown-linux-gnu
          echo "994cfcfac2d31e3514f4d30f5f7fabf8f7916458753cf81bec37464d41ec2a38  wkg" | sha256sum -c -
          chmod +x wkg
          mkdir -p wkg-bin && mv wkg wkg-bin/
          tar xzf tinygo.tar.gz
          echo "${{ runner.temp }}/tinygo/bin" >> "$GITHUB_PATH"
          echo "${{ runner.temp }}/wkg-bin" >> "$GITHUB_PATH"
          go install go.bytecodealliance.org/cmd/wit-bindgen-go@v0.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build polyglot guests (Tier A asserts zero WASI imports; Tier B the allowlist)
        run: |
          ./examples/filters/filter-hello-c/build.sh
          ./examples/filters/filter-hello-moonbit/build.sh
          ./examples/filters/filter-hello-js/build.sh
          ./examples/filters/filter-hello-go/build.sh

      - name: Wait for the background disk cleanup
        if: runner.environment == 'github-hosted'
        run: |
          if [ -f /tmp/disk-rm.pid ]; then
            while [ -e "/proc/$(cat /tmp/disk-rm.pid)" ]; do sleep 2; done
          fi
          df -h /
      # The whole feature-gated surface in ONE invocation and ONE dep world: host + control
      # suites (tcp_gate's fat-guest × outbound-tcp case, the outbound-http suites
      # extauthz / jwt) plus both polyglot conformance suites.
      - run: >
          cargo test -p plecto-host -p plecto-control --locked --features
          plecto-host/streaming-body,plecto-host/outbound-http,plecto-host/outbound-tcp,plecto-host/fat-guest,plecto-host/polyglot-conformance,plecto-control/outbound-http,plecto-control/outbound-tcp,plecto-control/fat-guest
      # Capabilities profile wiring check (ADR 000079): the exact feature set the release
      # ships must not be discovered broken at tag time. A dev-profile `cargo check` catches
      # the feature-wiring class (cfg misses, forwarding-chain typos, unused optional deps)
      # in seconds. Its own cargo invocation, never folded into the superset above: the
      # profile must be checked as it ships, and the `--version` self-report must not see
      # features the capabilities umbrella doesn't include.
      - run: cargo check --locked -p plecto --features capabilities
      # Exercise the capabilities branch of `plecto --version` (ADR 000079 Decision 6).
      - run: cargo test -p plecto --features capabilities --test cli --locked

  # Release-profile parity, main pushes only (wasmtime-CI-style "PRs light, merge-time
  # heavy"): release-profile codegen/link breakage is rare and expensive to check per PR
  # (~10 min of codegen), and release.yml's gate requires a green ci.yml run for the tagged
  # SHA on the default branch — so a tag can only point at a commit that has already passed
  # this job on main; PR-only green is not enough to ship. The dev-profile `cargo check
  # --features capabilities` in test-features keeps catching the feature-wiring class on
  # every PR. Each profile builds in its OWN cargo invocation — folding them into one would
  # let feature unification leak the capability deps into the minimal binary's graph.
  release-parity:
    name: release parity, both profiles (main only)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Free runner disk in the background
        if: runner.environment == 'github-hosted'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost &
          echo "$!" > /tmp/disk-rm.pid
      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1 (branch tip; no `toolchain` input to restate)
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-release
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            plecto
            plecto/examples/filters/filter-hello
            plecto/examples/filters/filter-quickstart
            plecto/examples/filters/filter-streaming
            plecto/examples/filters/filter-extauthz
            plecto/examples/filters/filter-jwt
            plecto/examples/filters/filter-cors
            plecto/examples/filters/filter-apikey
            plecto/examples/filters/filter-tcp-gate
            plecto/examples/filters/filter-ratelimit-redis
      - name: Wait for the background disk cleanup
        if: runner.environment == 'github-hosted'
        run: |
          if [ -f /tmp/disk-rm.pid ]; then
            while [ -e "/proc/$(cat /tmp/disk-rm.pid)" ]; do sleep 2; done
          fi
          df -h /
      - run: cargo build --release --locked
      - run: cargo build --release --locked -p plecto --features capabilities

  # ADR 000080: build the shelf with the exact encode path release.yml publishes
  # (scripts/build-reference-filters.sh) — the release-parity encode + import-floor gate,
  # asserted on every PR so CI green means the bytes we would ship are buildable and match
  # the compatibility matrix's import claims. Guest-workspace builds only (no wasmtime),
  # so it is a small parallel job, not a rider on the big test jobs.
  shelf:
    name: reference filters (encode + import floor)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1 (branch tip; no `toolchain` input to restate)
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-shelf
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            plecto/examples/filters/filter-jwt
            plecto/examples/filters/filter-cors
            plecto/examples/filters/filter-apikey
            plecto/examples/filters/filter-extauthz
      - name: Install wasm-tools (sha256-pinned)
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          curl -sSL -o wasm-tools.tar.gz https://github.com/bytecodealliance/wasm-tools/releases/download/v1.252.0/wasm-tools-1.252.0-x86_64-linux.tar.gz
          echo "097b1181d5b2bc3f2ebc44b4e72edf18308902023f1f1483a1a7dc1268ea988d  wasm-tools.tar.gz" | sha256sum -c -
          tar xzf wasm-tools.tar.gz
          echo "${{ runner.temp }}/wasm-tools-1.252.0-x86_64-linux" >> "$GITHUB_PATH"
      - name: Reference filter release-parity build (ADR 000080)
        working-directory: .
        run: ./scripts/build-reference-filters.sh "${{ runner.temp }}/shelf"

  # Lint the excluded WASM guest workspaces against their real targets (previously only
  # filter-hello was linted; the other cargo guests compiled via build.rs but never saw clippy).
  # Zero-WASI guests build for wasm32-unknown-unknown; the outbound/streaming fixtures use
  # wasip2 std, so they lint against wasm32-wasip2 (the split mirrors crates/host/build.rs).
  guest-lint:
    name: guest workspaces (clippy, wasm targets)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: plecto/examples/filters
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1 (branch tip; no `toolchain` input to restate)
        with:
          components: clippy
          targets: wasm32-unknown-unknown,wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: plecto-guest
          workspaces: |
            plecto/examples/filters/filter-hello
            plecto/examples/filters/filter-apikey
            plecto/examples/filters/filter-cors
            plecto/examples/filters/filter-quickstart
            plecto/examples/filters/filter-template
            plecto/examples/filters/filter-streaming
            plecto/examples/filters/filter-extauthz
            plecto/examples/filters/filter-jwt
            plecto/examples/filters/filter-tcp-gate
            plecto/examples/filters/filter-ratelimit-redis
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: clippy every cargo guest workspace
        run: |
          set -euo pipefail
          # wasip2 guests (wasi std / outbound imports), per crates/host/build.rs:
          wasip2="filter-streaming filter-extauthz filter-jwt filter-tcp-gate filter-ratelimit-redis"
          for m in */Cargo.toml; do
            d=$(dirname "$m")
            target=wasm32-unknown-unknown
            case " $wasip2 " in *" $d "*) target=wasm32-wasip2;; esac
            echo "== $d ($target)"
            (cd "$d" && cargo clippy --target "$target" --all-targets --locked -- -D warnings)
          done

  # Workflow security lint (zizmor), BLOCKING — the CI configuration itself is supply-chain
  # surface (OWASP A08; cf. the 2025 tj-actions and 2026 trivy-action tag-rewrite compromises).
  # Gates template injection, credential persistence (artipacked), excessive permissions,
  # unpinned/known-vulnerable actions, and dangerous triggers across .github/workflows/.
  # Installed from PyPI with --require-hashes (the wheel is the pin, matching the sha256-pinned
  # curl convention used for wasm-tools/wkg). GH_TOKEN enables the online audits
  # (known-vulnerable-actions), so a pinned action later found vulnerable turns CI red the same
  # way a RustSec advisory does in cargo-deny.
  workflow-lint:
    name: zizmor (workflow security lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install zizmor (PyPI, hash-pinned)
        run: |
          python3 -m pip install --require-hashes --only-binary :all: -r .github/zizmor-requirements.txt
      - name: zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor .github/workflows/

  # Supply-chain scan (RustSec advisories + crate bans), BLOCKING (ADR 000006 / OWASP A08).
  # A security vulnerability, unmaintained crate, or yanked version fails CI — supply-chain
  # integrity is a security gate, not a courtesy check. Policy is the curated `plecto/deny.toml`
  # (advisories deny; transitive duplicate versions warn). Clear an advisory by fixing/replacing
  # the crate, not by silencing it.
  cargo-deny:
    name: cargo-deny (supply-chain)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          manifest-path: plecto/Cargo.toml
          # `sources` also gates crate origin (only crates.io), catching a typosquat / unexpected
          # registry or git source early (A03). `licenses` uses deny.toml's allow-list so an
          # incompatible-license transitive cannot land silently with the SBOM release path.
          command: check advisories bans sources licenses

  # semver compatibility of the crates.io-published library crates (ADR 000090/000091), BLOCKING.
  # Baseline defaults to the newest version already on crates.io, diffed against this checkout's
  # API — so an unbumped breaking change fails CI instead of surfacing as a downstream consumer's
  # broken build. `plecto` (crates/plecto) is bin-only (no `[lib]`, ADR 000091) and has no public
  # API for the tool to check, so only the three library crates are listed.
  semver-checks:
    name: cargo-semver-checks (published crates)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          manifest-path: plecto/Cargo.toml
          package: plecto-host,plecto-control,plecto-server
          # default-features, NOT the default heuristic (≒ all-features): the heuristic turns on
          # plecto-host's `test-support`, whose build.rs compiles the fixture guests for
          # wasm32-unknown-unknown / wasm32-wasip2. That breaks twice over — the action's own
          # `stable` toolchain bypasses plecto/rust-toolchain.toml (no wasm targets, E0463), and
          # the crates.io baseline package doesn't even contain the guest sources
          # (examples/filters/ lives outside crates/host), so the baseline could never build with
          # `test-support` regardless of installed targets. Consumers get the default-features API
          # from crates.io; that is the surface this gate protects.
          feature-group: default-features
