name: PR policy

# Plecto is invitation-only for code. An unsolicited pull request — one that is not from a
# maintainer/collaborator and does not reference an issue a maintainer has labelled `accepting-pr` —
# is closed automatically. To contribute: open an issue, agree the approach, get it labelled
# `accepting-pr`, then open a PR that references it (e.g. `Agreed in: #123`). See CONTRIBUTING.md.
#
# Uses pull_request_target so the gate runs with a token that can close fork PRs. It only reads
# metadata and never checks out or runs PR code, so this is safe.
on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Maintainers and collaborators are always allowed.
            if (["OWNER", "MEMBER", "COLLABORATOR"].includes(pr.author_association)) {
              core.info(`Author association ${pr.author_association}: allowed.`);
              return;
            }

            // Otherwise the PR must reference an issue a maintainer labelled `accepting-pr`.
            const refs = [...new Set([...(pr.body || "").matchAll(/#(\d+)/g)].map(m => Number(m[1])))];
            for (const number of refs) {
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: number,
                });
                if (issue.data.pull_request) continue; // a PR reference, not an issue
                if ((issue.data.labels || []).some(l => (l.name || l) === "accepting-pr")) {
                  core.info(`Linked to accepting-pr issue #${number}: allowed.`);
                  return;
                }
              } catch (e) {
                core.info(`Could not fetch #${number}: ${e.message}`);
              }
            }

            const body = [
              "Thanks for your interest in Plecto! 🙏",
              "",
              "Plecto does not accept unsolicited pull requests — code contributions are **invitation-only**.",
              "Please open an issue describing the change, agree the approach with a maintainer, and once the",
              "issue is labelled `accepting-pr`, open a PR that references it (e.g. `Agreed in: #123`).",
              "",
              "Closing this automatically. If it was invited and references an `accepting-pr` issue, a maintainer",
              "can reopen it. See CONTRIBUTING.md.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, state: "closed",
            });
            core.notice("Closed an unsolicited pull request per the invitation-only policy.");
