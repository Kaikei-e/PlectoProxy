# Release engineering: applies the supply-chain discipline Plecto demands of its filters to
# Plecto's own artifacts (cosign signature + SBOM, ADR 000006's rule turned on ourselves).
# Triggered by a version tag the maintainer pushes; every job output lands in a DRAFT release,
# so publishing stays a deliberate human action.
#
# Artifacts per release:
#   - plecto-<tag>-<target>.tar.gz         binary (cargo-auditable: dep list embedded in-binary)
#   - *.sha256                             checksum
#   - *.sigstore.json                      cosign keyless signature bundle (verify against the
#                                          workflow's OIDC identity — no key to manage or leak)
#   - *.spdx.json                          SBOM (syft, reads the auditable data too)
#   - ghcr.io/<owner>/plecto               multi-arch image, provenance + SBOM attestations,
#                                          cosign-signed by digest
#
# Verify a binary:
#   cosign verify-blob --bundle plecto-<tag>-<target>.tar.gz.sigstore.json \
#     --certificate-identity-regexp 'https://github.com/Kaikei-e/Plecto/\.github/workflows/release\.yml@.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     plecto-<tag>-<target>.tar.gz
# Verify the image (same flags, `cosign verify ghcr.io/<owner>/plecto@<digest>`).

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the draft release + upload assets
  packages: write # push the GHCR image
  id-token: write # cosign keyless signing (Fulcio OIDC)
  actions: read # the gate job reads the tagged commit's CI run

env:
  CARGO_TERM_COLOR: always

jobs:
  # No artifact leaves this workflow before the tagged commit's CI is green. The container
  # image in particular is pushed live to GHCR (not draft-gated), so tagging in the same
  # breath as the push must not race CI: wait for the commit's CI run to conclude, fail
  # closed on anything but success (including a commit CI never ran on).
  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Require a green CI run for the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "gating release artifacts on CI for ${GITHUB_SHA}"
          while true; do
            runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&per_page=1")
            status=$(jq -r '.workflow_runs[0].status // "absent"' <<<"${runs}")
            conclusion=$(jq -r '.workflow_runs[0].conclusion // "pending"' <<<"${runs}")
            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "CI is green for this commit"
                exit 0
              fi
              echo "CI concluded '${conclusion}' for this commit — refusing to release" >&2
              exit 1
            fi
            # "absent" = CI has not started (or the tag points at a commit CI never covers);
            # keep waiting — the job's timeout-minutes fails this closed rather than shipping.
            echo "CI run status: ${status} — waiting 20s"
            sleep 20
          done

  binaries:
    needs: gate
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          # Native runners per arch — no cross toolchain to trust or debug.
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Compile inside a Debian bookworm container — NOT dtolnay/rust-toolchain directly on the
      # ubuntu-24.04(-arm) runner. The runner's glibc (2.39) is newer than the runtime image's,
      # gcr.io/distroless/cc-debian12 (glibc 2.36, verified 2026-07-03); a binary linked against
      # the newer one refuses to start there ("GLIBC_2.38 not found"). Bookworm's older glibc
      # runs fine on both the container-build job's distroless base and self-hosters' own
      # systems, and it's the same base image the Dockerfile's from-source path already used.
      # cargo-auditable embeds the exact dependency list in the binary itself, so scanners
      # (syft >= 1.15 reads it) can audit a deployed plecto without the source tree.
      - name: Build release binary (Debian bookworm container, matches the runtime image's glibc)
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src rust:1.96.0-bookworm bash -euxc '
            apt-get update && apt-get install -y --no-install-recommends cmake clang
            cargo install cargo-auditable --locked
            cargo auditable build --manifest-path plecto/Cargo.toml --release --locked -p plecto-server
          '
      # Feeds the container-build job below: it COPYs this binary into the runtime image
      # instead of recompiling Rust a second time under QEMU emulation for the arm64 leg
      # (that used to hang for tens of minutes; native-per-arch + reuse fixes it — see
      # container-build's comment).
      - name: Upload binary artifact for the container build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plecto-bin-${{ matrix.target }}
          path: plecto/target/release/plecto
          retention-days: 1
      - name: Package
        id: package
        run: |
          NAME="plecto-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "${NAME}"
          cp plecto/target/release/plecto LICENSE "${NAME}/"
          tar czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
      - name: SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: plecto/target/release/plecto
          format: spdx-json
          output-file: ${{ steps.package.outputs.name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign artifacts (cosign keyless)
        run: |
          NAME="${{ steps.package.outputs.name }}"
          cosign sign-blob --yes --bundle "${NAME}.tar.gz.sigstore.json" "${NAME}.tar.gz"
          cosign sign-blob --yes --bundle "${NAME}.tar.gz.sha256.sigstore.json" "${NAME}.tar.gz.sha256"
      - name: Upload to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="${{ steps.package.outputs.name }}"
          # both matrix jobs race to create the draft once; the loser just uploads.
          gh release create "${GITHUB_REF_NAME}" --draft --verify-tag \
            --title "${GITHUB_REF_NAME}" --notes "See CHANGELOG.md" || true
          gh release upload "${GITHUB_REF_NAME}" \
            "${NAME}.tar.gz" "${NAME}.tar.gz.sha256" \
            "${NAME}.tar.gz.sigstore.json" "${NAME}.tar.gz.sha256.sigstore.json" \
            "${NAME}.spdx.json" --clobber

  # Builds the container image NATIVELY per architecture (same runner split as `binaries`) and
  # COPYs in the binary that job already built, instead of recompiling Rust inside `docker build`
  # under QEMU emulation. That emulated path is what used to hang: compiling wasmtime/cranelift
  # (plus aws-lc-sys's C code) under user-mode QEMU is 5-20x slower than native and turned a
  # ~6-minute build into a multi-hour stall on the arm64 leg. See docs/ADR (release engineering)
  # and Docker's own guidance against emulating compiled-language builds:
  # https://docs.docker.com/build/building/multi-platform/
  #
  # Each leg pushes its single-platform image by digest (no tag yet); container-merge below
  # assembles the multi-arch manifest list from those digests and signs it.
  container-build:
    name: container image (${{ matrix.target }})
    needs: [gate, binaries]
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Download the native binary already built for this arch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plecto-bin-${{ matrix.target }}
          path: dist
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Lowercase the image reference (registries reject the mixed-case repo owner)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/plecto" >> "$GITHUB_ENV"
      - name: Build and push by digest (native — no QEMU, no recompile)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          build-args: SOURCE=prebuilt
          build-contexts: prebuilt=dist
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # BuildKit provenance + SBOM attestations ride each platform's own manifest; imagetools
          # create (below) nests them under the merged multi-arch index unchanged.
          provenance: mode=max
          sbom: true
      - name: Export the digest for the merge job
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.target }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  container-merge:
    name: container image (merge manifest + sign)
    needs: container-build
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Lowercase the image reference (registries reject the mixed-case repo owner)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/plecto" >> "$GITHUB_ENV"
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Create and push the multi-arch manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create --metadata-file /tmp/imagetools-metadata.json \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the image digest (cosign keyless)
        # Sign the DIGEST, never a tag — a tag is mutable, the digest is the artifact.
        run: |
          digest=$(jq -r '.["containerimage.descriptor"].digest' /tmp/imagetools-metadata.json)
          cosign sign --yes "${{ env.IMAGE }}@${digest}"
