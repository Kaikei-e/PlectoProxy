# Release engineering: applies the supply-chain discipline Plecto demands of its filters to
# Plecto's own artifacts (cosign signature + SBOM, ADR 000006's rule turned on ourselves).
# Triggered by a version tag the maintainer pushes; every job output lands in a DRAFT release,
# so publishing stays a deliberate human action.
#
# Artifacts per release — each in TWO named runtime capability profiles (ADR 000079):
# unsuffixed = minimal (default features, smallest attack surface); -capabilities =
# outbound-http + outbound-tcp + fat-guest compiled in. Compile-time inclusion is not a runtime
# grant: a capabilities binary still lends nothing to a filter unless the manifest declares it
# per filter (deny-by-default + allowlist + SSRF floor, ADR 000036 / 000060). Both profiles ride
# the same supply-chain discipline (auditable build, SBOM, cosign, draft release); per-profile
# image digests are recorded in the draft release notes.
#   - plecto-<tag>-<target>[-capabilities].tar.gz
#                                          binary (cargo-auditable: dep list embedded in-binary;
#                                          the profiles' embedded lists genuinely differ — the
#                                          capability features pull crates minimal never links)
#   - *.sha256                             checksum
#   - *.sigstore.json                      cosign keyless signature bundle (verify against the
#                                          workflow's OIDC identity — no key to manage or leak)
#   - *.spdx.json                          SBOM (syft, reads the auditable data too)
#   - ghcr.io/<owner>/plecto               one multi-arch image per profile: tags <ver> /
#                                          <major>.<minor> (minimal) and the same + "-capabilities"
#                                          suffix; provenance + SBOM attestations, cosign-signed
#                                          by each profile's own index digest
#   - ghcr.io/kaikei-e/wit/plecto/*        plecto:filter (+ experimental plecto:filter-streaming)
#                                          WIT contract, CNCF Wasm OCI Artifact layout (ADR 000064);
#                                          digest recorded in this tag's release notes
#   - ghcr.io/kaikei-e/plecto/filters/*    reference filter components (jwt / cors / apikey /
#                                          extauthz), each its own CNCF Wasm OCI Artifact,
#                                          cosign-signed by digest with an SPDX SBOM attestation
#                                          (ADR 000080); digest + required runtime profile recorded
#                                          in this tag's release notes, the full compatibility
#                                          matrix in docs/reference-filters.md
#
# Verify a binary (minimal = unsuffixed; capabilities = insert "-capabilities" before .tar.gz):
#   cosign verify-blob --bundle plecto-<tag>-<target>.tar.gz.sigstore.json \
#     --certificate-identity-regexp 'https://github.com/Kaikei-e/PlectoProxy/\.github/workflows/release\.yml@.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     plecto-<tag>-<target>.tar.gz
#   cosign verify-blob --bundle plecto-<tag>-<target>-capabilities.tar.gz.sigstore.json \
#     --certificate-identity-regexp 'https://github.com/Kaikei-e/PlectoProxy/\.github/workflows/release\.yml@.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     plecto-<tag>-<target>-capabilities.tar.gz
# Verify an image (same flags; pin the profile's index digest from the release notes):
#   cosign verify ghcr.io/<owner>/plecto@<minimal-digest>
#   cosign verify ghcr.io/<owner>/plecto@<capabilities-digest>
# Verify a reference filter and its SBOM attestation (same flags; pin the digest from the notes):
#   cosign verify ghcr.io/kaikei-e/plecto/filters/<name>@<digest>
#   cosign verify-attestation --type spdxjson ghcr.io/kaikei-e/plecto/filters/<name>@<digest>

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the draft release + upload assets
  packages: write # push the GHCR image
  id-token: write # cosign keyless signing (Fulcio OIDC)
  actions: read # the gate job reads the tagged commit's CI run

env:
  CARGO_TERM_COLOR: always

jobs:
  # No artifact leaves this workflow before the tagged commit's CI is green on the default
  # branch (ADR 000079). PR-only green is not enough: capabilities release-parity
  # (`cargo build --release --features capabilities`) runs on main pushes only, so a tag on a
  # PR tip that never landed on main would otherwise ship an un-parity-checked profile. The
  # container image is pushed live to GHCR (not draft-gated), so this gate must fail closed —
  # including when CI never ran on the default branch for this SHA.
  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Require a green default-branch CI run for the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          default_branch=$(gh api "repos/${GITHUB_REPOSITORY}" -q .default_branch)
          echo "gating release on ci.yml for ${GITHUB_SHA} on ${default_branch}"
          while true; do
            runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&per_page=30")
            selected=$(jq -c --arg b "${default_branch}" '
              [.workflow_runs[] | select(.head_branch == $b)] | .[0] // null
            ' <<<"${runs}")
            if [ "${selected}" = "null" ]; then
              # No default-branch run yet (or the tag points at a commit that never landed on
              # main). Keep waiting — timeout-minutes fails closed rather than shipping.
              echo "no ci.yml run on ${default_branch} for this SHA yet — waiting 20s"
              sleep 20
              continue
            fi
            status=$(jq -r '.status' <<<"${selected}")
            conclusion=$(jq -r '.conclusion // "pending"' <<<"${selected}")
            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "ci.yml is green on ${default_branch} for this commit"
                exit 0
              fi
              echo "ci.yml on ${default_branch} concluded '${conclusion}' — refusing to release" >&2
              exit 1
            fi
            echo "ci.yml on ${default_branch} status: ${status} — waiting 20s"
            sleep 20
          done

  binaries:
    needs: gate
    timeout-minutes: 20
    strategy:
      matrix:
        # Profile × arch (ADR 000079). The profile name doubles as the cargo feature name
        # (`--features capabilities`); minimal is the plain default-features build. Each profile
        # builds in its OWN job / cargo invocation — folding them into one invocation would let
        # cargo's feature unification leak the capability deps into the minimal binary's graph.
        profile: [minimal, capabilities]
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
        include:
          # Native runners per arch — no cross toolchain to trust or debug.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Compile inside a Debian bookworm container — NOT dtolnay/rust-toolchain directly on the
      # ubuntu-24.04(-arm) runner. The runner's glibc (2.39) is newer than the runtime image's,
      # gcr.io/distroless/cc-debian12 (glibc 2.36, verified 2026-07-03); a binary linked against
      # the newer one refuses to start there ("GLIBC_2.38 not found"). Bookworm's older glibc
      # runs fine on both the container-build job's distroless base and self-hosters' own
      # systems, and it's the same base image the Dockerfile's from-source path already used.
      # cargo-auditable embeds the exact dependency list in the binary itself, so scanners
      # (syft >= 1.15 reads it) can audit a deployed plecto without the source tree.
      - name: Build release binary (Debian bookworm container, matches the runtime image's glibc)
        run: |
          FEATURES=''
          if [ "${{ matrix.profile }}" != "minimal" ]; then
            FEATURES="--features ${{ matrix.profile }}"
          fi
          docker run --rm -e "FEATURES=${FEATURES}" -v "${{ github.workspace }}:/src" -w /src rust:1.96.0-bookworm bash -euxc '
            apt-get update && apt-get install -y --no-install-recommends cmake clang
            cargo install cargo-auditable --locked
            cargo auditable build --manifest-path plecto/Cargo.toml --release --locked -p plecto ${FEATURES}
          '
      # Feeds the container-build job below: it COPYs this binary into the runtime image
      # instead of recompiling Rust a second time under QEMU emulation for the arm64 leg
      # (that used to hang for tens of minutes; native-per-arch + reuse fixes it — see
      # container-build's comment).
      - name: Upload binary artifact for the container build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plecto-bin-${{ matrix.target }}-${{ matrix.profile }}
          path: plecto/target/release/plecto
          retention-days: 1
      - name: Package
        id: package
        run: |
          # Unsuffixed = minimal (deny-by-default posture: the artifact you get without asking
          # for more is the smallest attack surface); other profiles carry their name as suffix.
          SUFFIX=''
          if [ "${{ matrix.profile }}" != "minimal" ]; then
            SUFFIX="-${{ matrix.profile }}"
          fi
          NAME="plecto-${GITHUB_REF_NAME}-${{ matrix.target }}${SUFFIX}"
          mkdir "${NAME}"
          cp plecto/target/release/plecto LICENSE "${NAME}/"
          tar czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
      - name: SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: plecto/target/release/plecto
          format: spdx-json
          output-file: ${{ steps.package.outputs.name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign artifacts (cosign keyless)
        run: |
          NAME="${{ steps.package.outputs.name }}"
          cosign sign-blob --yes --bundle "${NAME}.tar.gz.sigstore.json" "${NAME}.tar.gz"
          cosign sign-blob --yes --bundle "${NAME}.tar.gz.sha256.sigstore.json" "${NAME}.tar.gz.sha256"
      - name: Upload to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="${{ steps.package.outputs.name }}"
          # the profile × arch matrix jobs race to create the draft once; the losers just upload.
          gh release create "${GITHUB_REF_NAME}" --draft --verify-tag \
            --title "${GITHUB_REF_NAME}" --notes "See CHANGELOG.md" || true
          gh release upload "${GITHUB_REF_NAME}" \
            "${NAME}.tar.gz" "${NAME}.tar.gz.sha256" \
            "${NAME}.tar.gz.sigstore.json" "${NAME}.tar.gz.sha256.sigstore.json" \
            "${NAME}.spdx.json" --clobber

  # Builds the container image NATIVELY per architecture (same runner split as `binaries`) and
  # COPYs in the binary that job already built, instead of recompiling Rust inside `docker build`
  # under QEMU emulation. That emulated path is what used to hang: compiling wasmtime/cranelift
  # (plus aws-lc-sys's C code) under user-mode QEMU is 5-20x slower than native and turned a
  # ~6-minute build into a multi-hour stall on the arm64 leg. See docs/ADR (release engineering)
  # and Docker's own guidance against emulating compiled-language builds:
  # https://docs.docker.com/build/building/multi-platform/
  #
  # Each leg pushes its single-platform image by digest (no tag yet); container-merge below
  # assembles the multi-arch manifest list from those digests and signs it.
  container-build:
    name: container image (${{ matrix.target }}, ${{ matrix.profile }})
    needs: [gate, binaries]
    timeout-minutes: 15
    strategy:
      matrix:
        # Same profile × arch split as `binaries` — each profile gets its own multi-arch image
        # (ADR 000079), assembled from the per-arch digests by container-merge below.
        profile: [minimal, capabilities]
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Download the native binary already built for this arch and profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plecto-bin-${{ matrix.target }}-${{ matrix.profile }}
          path: dist
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Lowercase the image reference (registries reject the mixed-case repo owner)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/plecto" >> "$GITHUB_ENV"
      - name: Build and push by digest (native — no QEMU, no recompile)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          build-args: SOURCE=prebuilt
          build-contexts: prebuilt=dist
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # BuildKit provenance + SBOM attestations ride each platform's own manifest; imagetools
          # create (below) nests them under the merged multi-arch index unchanged.
          provenance: mode=max
          sbom: true
      - name: Export the digest for the merge job
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      # The artifact name leads with the profile so the merge job can glob one profile's
      # per-arch digests (digests-<profile>-*) without mixing the two images.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.profile }}-${{ matrix.target }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  container-merge:
    name: container image (merge manifests + sign, both profiles)
    needs: container-build
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      # No merge-multiple: each digests-<profile>-<target> artifact keeps its own subdirectory,
      # so the per-profile loop below can glob one profile's arch digests without mixing images.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Lowercase the image reference (registries reject the mixed-case repo owner)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/plecto" >> "$GITHUB_ENV"
      - id: meta
        # Emits the minimal (unsuffixed) tag set; the loop below appends the profile-name
        # suffix for every other profile (ADR 000079's naming: unsuffixed = minimal).
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Create, push, and sign one multi-arch manifest list per profile
        # One sequential loop, not a profile matrix: both digests land in one artifact for the
        # single release-notes writer below (ADR 000079 — no parallel read-modify-write).
        # Sign each profile's index DIGEST, never a tag — a tag is mutable, the digest is the
        # artifact, and each profile is its own index.
        run: |
          : > /tmp/image-digests.md
          for profile in minimal capabilities; do
            suffix=''
            if [ "${profile}" != "minimal" ]; then suffix="-${profile}"; fi
            tags=$(jq -cr --arg s "${suffix}" '.tags | map("-t " + . + $s) | join(" ")' \
              <<< "$DOCKER_METADATA_OUTPUT_JSON")
            refs=''
            for f in /tmp/digests/digests-${profile}-*/*; do
              refs="${refs}${IMAGE}@sha256:$(basename "${f}") "
            done
            docker buildx imagetools create --metadata-file "/tmp/imagetools-${profile}.json" \
              ${tags} ${refs}
            digest=$(jq -r '.["containerimage.descriptor"].digest' "/tmp/imagetools-${profile}.json")
            cosign sign --yes "${IMAGE}@${digest}"
            echo "- ${profile}: \`${IMAGE}@${digest}\`" >> /tmp/image-digests.md
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes-images
          path: /tmp/image-digests.md
          if-no-files-found: error
          retention-days: 1

  # Publishes the plecto:filter WIT contract (and the experimental plecto:filter-streaming) to
  # ghcr.io as CNCF Wasm OCI Artifacts (ADR 000064) — the contract-side counterpart of the
  # binary/image supply-chain discipline above. Independent of `binaries`/`container-build`: a
  # WIT-publish hiccup must not block shipping the binaries, and vice versa — `needs: gate` only.
  #
  # The WIT contract is versioned independently of the crate/binary release (CHANGELOG.md's
  # "Versioning policy"), so most tags republish an unchanged `package plecto:filter@x.y.z`. The
  # existence + digest check below makes that a no-op read instead of depending on wkg's own
  # re-publish-identical-version behavior, which this workflow does not assume either way.
  wit-publish:
    name: WIT contract (wkg publish)
    needs: gate
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    # Job-level permissions REPLACE the workflow-level default (deny-by-default, ADR 000006's own
    # rule turned on this workflow): this job neither cosign-signs nor reads the gate's CI status,
    # so it gets neither `id-token` nor `actions: read`. Digests go to an artifact; the single
    # release-notes job owns the draft-release body (no contents: write race).
    permissions:
      packages: write # push the WIT OCI artifacts to ghcr.io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install wkg (sha256-pinned, same release ci.yml already pins for wkg wit fetch)
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          curl -sSL -o wkg https://github.com/bytecodealliance/wasm-pkg-tools/releases/download/v0.15.1/wkg-x86_64-unknown-linux-gnu
          echo "994cfcfac2d31e3514f4d30f5f7fabf8f7916458753cf81bec37464d41ec2a38  wkg" | sha256sum -c -
          chmod +x wkg
          mkdir -p wkg-bin && mv wkg wkg-bin/
          echo "${{ runner.temp }}/wkg-bin" >> "$GITHUB_PATH"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          # wkg has no OCI-auth flag of its own — it falls back to this docker credential store
          # when its own config carries none (plecto/wkg-registry.toml deliberately doesn't).
      - name: Publish plecto:filter and plecto:filter-streaming
        id: publish
        run: |
          set -euo pipefail
          publish_one() {
            local wit_dir="$1" pkg_name="$2" out_var="$3"
            local version ref digest
            version=$(sed -n "s/^package plecto:${pkg_name}@\([0-9.]*\);/\1/p" "${wit_dir}"/*.wit)
            : "${version:?could not parse a package plecto:${pkg_name}@x.y.z; line from ${wit_dir}}"
            ref="ghcr.io/kaikei-e/wit/plecto/${pkg_name}:${version}"
            if docker buildx imagetools inspect "${ref}" >/dev/null 2>&1; then
              echo "plecto:${pkg_name}@${version} already published at ${ref} — skipping push"
            else
              wkg wit build --wit-dir "${wit_dir}" -o "${pkg_name}.wasm" --config plecto/wkg-registry.toml
              wkg publish "${pkg_name}.wasm" --config plecto/wkg-registry.toml
            fi
            digest=$(docker buildx imagetools inspect "${ref}" --format "{{json .Manifest}}" | jq -r '.digest')
            echo "plecto:${pkg_name}@${version} -> ${ref}@${digest}"
            echo "${out_var}=${ref}@${digest}" >>"$GITHUB_OUTPUT"
          }
          publish_one plecto/wit filter filter_ref
          publish_one plecto/wit-streaming filter-streaming streaming_ref
      - name: Write WIT digests for the release-notes job
        run: |
          set -euo pipefail
          {
            echo "- ${{ steps.publish.outputs.filter_ref }}"
            echo "- ${{ steps.publish.outputs.streaming_ref }} (experimental, off-by-default)"
          } >/tmp/wit-digests.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes-wit
          path: /tmp/wit-digests.md
          if-no-files-found: error
          retention-days: 1

  # Publishes the reference filter components — jwt, cors, apikey, extauthz — as individually
  # cosign-signed CNCF Wasm OCI Artifacts with SPDX SBOM attestations (ADR 000080): the third
  # artifact class next to the host binaries/images (ADR 000047 / 000079) and the WIT contract
  # (ADR 000064). The test-fixture builds in crates/host/build.rs do not count as shipping
  # (ADR 000080 Decision 3); only these signed artifacts do. Like wit-publish, independent of
  # binaries/container-build — a filter-publish hiccup must not block the binaries, and vice
  # versa — `needs: gate` only.
  #
  # Build path is shared with ci.yml via scripts/build-reference-filters.sh (same
  # wasm-tools / wasip2 encode, same import-floor asserts). Filters version independently of
  # the runtime (each guest's Cargo.toml): we always rebuild; if <name>:<version> already
  # exists we compare the pulled component's sha256 to the local build and fail closed on
  # mismatch (bump the filter version — tags are immutable). Matching digests skip push.
  # verify-before-sign re-signs / re-attests only a digest that lacks a valid signature or
  # SBOM attestation — self-healing after a partial earlier run without piling signatures.
  #
  # SBOM: syft scans the component .wasm bytes (not the source tree), then cosign attest
  # binds that SPDX predicate to the OCI manifest digest. That is OCI-digest-bound attestation
  # of the shipped component; the host's keyed load path still re-binds under the operator's
  # [trust] key (ADR 000006 / Decision 5).
  #
  # ghcr quirk (same as ADR 000064's WIT packages): the first push of each filters/<name>
  # package lands PRIVATE; flipping it Public is a one-time manual step in the package settings.
  filter-publish:
    name: reference filters (OCI publish + sign)
    needs: gate
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    # Job-level permissions REPLACE the workflow-level default (deny-by-default): unlike
    # wit-publish this job cosign-signs, so it needs `id-token`, but it still neither reads CI
    # status nor writes the release — digests go to an artifact for the single release-notes
    # writer.
    permissions:
      packages: write # push the filter OCI artifacts to ghcr.io
      id-token: write # cosign keyless signing + SBOM attestation (Fulcio OIDC)
    env:
      FILTERS_NS: ghcr.io/kaikei-e/plecto/filters
      CERT_ID_REGEXP: https://github.com/Kaikei-e/PlectoProxy/\.github/workflows/release\.yml@.*
      OIDC_ISSUER: https://token.actions.githubusercontent.com
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Same toolchain shape as ci.yml's build job: rust-toolchain.toml pins the channel and
      # wasm32-unknown-unknown; wasm32-wasip2 (the outbound guests' target) is added here.
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0 (branch tip; no `toolchain` input to restate)
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip2
      - name: Install wasm-tools + wkg (sha256-pinned, same pins as ci.yml)
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          curl -sSL -o wasm-tools.tar.gz https://github.com/bytecodealliance/wasm-tools/releases/download/v1.252.0/wasm-tools-1.252.0-x86_64-linux.tar.gz
          echo "097b1181d5b2bc3f2ebc44b4e72edf18308902023f1f1483a1a7dc1268ea988d  wasm-tools.tar.gz" | sha256sum -c -
          tar xzf wasm-tools.tar.gz
          curl -sSL -o wkg https://github.com/bytecodealliance/wasm-pkg-tools/releases/download/v0.15.1/wkg-x86_64-unknown-linux-gnu
          echo "994cfcfac2d31e3514f4d30f5f7fabf8f7916458753cf81bec37464d41ec2a38  wkg" | sha256sum -c -
          chmod +x wkg
          mkdir -p wkg-bin && mv wkg wkg-bin/
          echo "${{ runner.temp }}/wasm-tools-1.252.0-x86_64-linux" >> "$GITHUB_PATH"
          echo "${{ runner.temp }}/wkg-bin" >> "$GITHUB_PATH"
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          # wkg has no OCI-auth flag of its own — it falls back to this docker credential store.
      - name: Build shelf (shared script — same as CI release-parity)
        run: ./scripts/build-reference-filters.sh "${RUNNER_TEMP}/shelf"
      - name: Push, sign, and attest each reference filter
        run: |
          set -euo pipefail
          : > /tmp/filter-digests.md
          while IFS=$'\t' read -r short _kind profile local_sha component; do
            case "${short}" in
              jwt) guest="plecto/examples/filters/filter-jwt" ;;
              cors) guest="plecto/examples/filters/filter-cors" ;;
              apikey) guest="plecto/examples/filters/filter-apikey" ;;
              extauthz) guest="plecto/examples/filters/filter-extauthz" ;;
              *) echo "error: unknown shelf short name '${short}'" >&2; exit 1 ;;
            esac
            version=$(sed -n 's/^version = "\([0-9][0-9.]*\)"$/\1/p' "${guest}/Cargo.toml" | head -n1)
            : "${version:?could not parse a version from ${guest}/Cargo.toml}"
            repo="${FILTERS_NS}/${short}"
            ref="${repo}:${version}"

            if docker buildx imagetools inspect "${ref}" >/dev/null 2>&1; then
              remote="${RUNNER_TEMP}/${short}.remote.wasm"
              wkg oci pull "${ref}" -o "${remote}"
              # Same strip-then-hash as scripts/build-reference-filters.sh (content_sha).
              remote_stripped="${RUNNER_TEMP}/${short}.remote.stripped.wasm"
              wasm-tools strip "${remote}" -o "${remote_stripped}"
              remote_sha="$(sha256sum "${remote_stripped}" | awk '{print $1}')"
              if [ "${local_sha}" != "${remote_sha}" ]; then
                echo "error: ${short}@${version} already at ${ref} but content differs from this commit" >&2
                echo "  published content-sha256:${remote_sha}" >&2
                echo "  this commit content-sha256:${local_sha}" >&2
                echo "Bump ${guest}/Cargo.toml version (ADR 000080 — filter tags are immutable)." >&2
                exit 1
              fi
              echo "${short}@${version} content matches ${ref} — skip push"
            else
              wkg oci push "${ref}" "${component}" \
                --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            fi

            digest=$(docker buildx imagetools inspect "${ref}" --format "{{json .Manifest}}" | jq -r '.digest')
            if ! cosign verify --certificate-identity-regexp "${CERT_ID_REGEXP}" \
                --certificate-oidc-issuer "${OIDC_ISSUER}" "${repo}@${digest}" >/dev/null 2>&1; then
              cosign sign --yes "${repo}@${digest}"
            fi
            if ! cosign verify-attestation --type spdxjson \
                --certificate-identity-regexp "${CERT_ID_REGEXP}" \
                --certificate-oidc-issuer "${OIDC_ISSUER}" "${repo}@${digest}" >/dev/null 2>&1; then
              # Scan the component bytes we are shipping — not the source tree (ADR 000080).
              syft scan "file:${component}" -o "spdx-json=${RUNNER_TEMP}/${short}.spdx.json"
              cosign attest --yes --type spdxjson \
                --predicate "${RUNNER_TEMP}/${short}.spdx.json" "${repo}@${digest}"
            fi
            echo "- ${short} ${version}: \`${repo}@${digest}\` (runtime profile: ${profile})" >>/tmp/filter-digests.md
          done < "${RUNNER_TEMP}/shelf/manifest.tsv"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes-filters
          path: /tmp/filter-digests.md
          if-no-files-found: error
          retention-days: 1

  # Single writer for the draft release body (ADR 000079): container-merge, wit-publish, and
  # filter-publish each upload a digest fragment; this job overwrites the notes once. Avoids the
  # lost-update race of parallel `gh release view` → append → `gh release edit`. `binaries` may
  # have created the draft earlier with a placeholder body — that is fine; we replace it here.
  release-notes:
    name: draft release notes (images + WIT + filters)
    needs: [binaries, container-merge, wit-publish, filter-publish]
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create/edit the draft release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/notes
          pattern: release-notes-*
      - name: Compose and set the draft release notes
        env:
          GH_TOKEN: ${{ github.token }}
          # No checkout in this job — gh cannot infer the repo from a git remote, so pin it
          # explicitly (first exercised on v0.3.2: "failed to run git: not a git repository").
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" --draft --verify-tag \
            --title "${GITHUB_REF_NAME}" --notes "See CHANGELOG.md" || true
          {
            echo "See CHANGELOG.md"
            echo
            echo "Container images (per runtime capability profile, ADR 000079):"
            cat /tmp/notes/release-notes-images/image-digests.md
            echo
            echo "WIT contract (ADR 000064):"
            cat /tmp/notes/release-notes-wit/wit-digests.md
            echo
            echo "Reference filters (ADR 000080; compatibility matrix: docs/reference-filters.md):"
            cat /tmp/notes/release-notes-filters/filter-digests.md
          } >/tmp/release-notes.md
          gh release edit "${GITHUB_REF_NAME}" --notes-file /tmp/release-notes.md
