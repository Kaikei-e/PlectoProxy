[package]
name = "plecto-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# The M2 fast path: a TCP/HTTP-1.1 listener that drives requests through the control plane's
# routed filter chains and forwards to upstreams (ADR 000013). lib + bin.
[lib]
name = "plecto_server"
path = "src/lib.rs"

[[bin]]
name = "plecto"
path = "src/main.rs"

[dependencies]
plecto-control = { path = "../control" }
tokio = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
http-body-util = { workspace = true }
bytes = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
# tokio-rustls: wrap each accepted TCP stream in a TLS handshake before handing it to hyper
# (ADR 000014). The ServerConfig is built by control; this is just the async acceptor.
tokio-rustls = { workspace = true }

[dev-dependencies]
# the host's test_support (TestSigner / bound_sbom / filter_hello_component) for E2E fixtures,
# and a TOML writer for the on-disk manifest a test points the server at.
plecto-host = { path = "../host" }
tempfile = "3"
# rcgen: generate a fresh self-signed cert for the TLS E2E (ring backend, no aws-lc-rs/cmake).
rcgen = { version = "0.13", default-features = false, features = ["ring", "pem"] }
