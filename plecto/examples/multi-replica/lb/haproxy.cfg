# Front L4 slot of the multi-replica reference (ADR 000088). TCP mode: content-agnostic
# passthrough (plaintext and TLS scenarios alike), PROXY protocol v2 toward Plecto so the
# replicas see the real client address (ADR 000057).
#
# Health checks hit Plecto's /readyz on the ADMIN port (9099), never the traffic port:
# a draining replica flips /readyz to 503 while still finishing in-flight work
# (ADR 000059), so the LB takes it out of rotation before any request can fail.

global
    log stdout format raw local0
    presetenv PLECTO_PORT 8080

defaults
    mode tcp
    log global
    option tcplog
    timeout connect 5s
    timeout client 65s
    timeout server 65s

# Docker's embedded DNS: re-resolution keeps the backend addresses current when a
# replica is recreated, and init-addr lets the LB start even while a replica is down.
resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend edge
    bind :8080
    default_backend plecto

backend plecto
    option httpchk GET /readyz
    http-check expect status 200
    # inter 1s + fall 2 ≈ NOT-READY detected within ~2s — inside the manifests'
    # readiness_grace_ms (3s), so the drain demo drops nothing.
    default-server check port 9099 inter 1s fastinter 250ms fall 2 rise 2 send-proxy-v2 resolvers docker init-addr last,libc,none
    server plecto-1 "plecto-1:${PLECTO_PORT}"
    server plecto-2 "plecto-2:${PLECTO_PORT}"
