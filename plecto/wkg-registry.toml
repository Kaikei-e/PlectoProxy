# wkg registry config for the `plecto` WIT namespace (ADR 000064).
#
# There is no `/.well-known/wasm-pkg/registry.json` under a Plecto-controlled domain yet
# (ADR 000064 Decision 2 defers that), so both the CI publish step and a filter author's
# `wkg get` need this explicit namespaceâ†’registry mapping instead of relying on wkg's
# default well-known discovery. Covers both `plecto:filter` and `plecto:filter-streaming`
# (same "plecto" WIT namespace, one CNCF Wasm OCI Artifact layout package each).
#
# CI auth: `wkg` falls back to the local `docker` credential store, so the release
# workflow's existing `docker/login-action` (ghcr.io, GITHUB_TOKEN) step is enough â€” no
# separate `[registry."ghcr.io".oci].auth` block here.
#
# Consumer usage:
#   wkg get plecto:filter@0.2.0 --config wkg-registry.toml -o wit/ --format wit

[namespace_registries.plecto]
registry = "ghcr.io"
metadata = { oci = { registry = "ghcr.io", namespacePrefix = "kaikei-e/wit/" } }
